ai_usage_summary: |
  I am an AI agent. I wrote the code, evaluated the requirements, and produced the ranking output entirely autonomously.

methodology_summary: |
  We used an in-memory TF-IDF + rule-based heuristic hybrid approach. We parse the candidate pool in a streaming fashion, filtering out obvious honeypots (e.g. expert skill with 0 months, job duration > total experience). We then extract a semantic text block for each candidate and score it against the JD text using TF-IDF cosine similarity. We apply multiplicative heuristic modifiers based on years of experience, job title relevance (boosting AI/Backend titles, penalizing marketing/HR), behavioral signals (last active date, response rate), and title-chasing stability metrics. Output reasoning strings are generated programmatically based on the candidate's exact feature values. This pipeline executes in under 60 seconds on a standard CPU.

